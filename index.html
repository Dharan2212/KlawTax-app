<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1E3A8A" />
    <meta name="color-scheme" content="light" />
    <meta name="format-detection" content="telephone=no" />

    <!-- Favicon / App icons -->
    <link rel="icon"             type="image/png"  href="/favicon.png" />
    <link rel="shortcut icon"                      href="/favicon.png" />
    <link rel="apple-touch-icon"                   href="/favicon.png" />
    <link rel="manifest"                           href="/site.webmanifest" />

    <!-- Default SEO meta — overridden per-page by react-helmet-async -->
    <title>KlawTax.online | Premium Legal &amp; NGO Services in India</title>
    <meta name="description"  content="Premium legal, NGO, registration, compliance, audit, and digital services with transparent pricing, expert support, and fast service across India." />
    <meta name="keywords"     content="NGO registration, 12A registration, 80G registration, Section 8 company, GST registration, ISO certification, audit services, compliance services, legal services India" />
    <meta name="author"       content="KlawTax.online" />
    <meta name="robots"       content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    <link rel="canonical"     href="https://klawtax.online/" />

    <!-- Open Graph -->
    <meta property="og:site_name"    content="KlawTax.online" />
    <meta property="og:type"         content="website" />
    <meta property="og:url"          content="https://klawtax.online/" />
    <meta property="og:title"        content="KlawTax.online | Premium Legal &amp; NGO Services in India" />
    <meta property="og:description"  content="Premium legal, NGO, registration, compliance, audit, and digital services with transparent pricing, expert support, and fast service across India." />
    <meta property="og:image"        content="https://klawtax.online/og-image.png" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt"    content="KlawTax.online — Legal &amp; NGO Services" />
    <meta property="og:locale"       content="en_IN" />

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:site"        content="@KlawTax" />
    <meta name="twitter:creator"     content="@KlawTax" />
    <meta name="twitter:title"       content="KlawTax.online | Premium Legal &amp; NGO Services in India" />
    <meta name="twitter:description" content="Premium legal, NGO, registration, compliance, audit, and digital services with transparent pricing, expert support, and fast service across India." />
    <meta name="twitter:image"       content="https://klawtax.online/og-image.png" />
    <meta name="twitter:image:alt"   content="KlawTax.online — Legal &amp; NGO Services" />

    <!-- Preconnect to external font origins (fonts loaded via CSS) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
