# ══════════════════════════════════════════════════════════════════════════════
# KlawTax — Production Nginx Configuration
# Phase 7.3 | Version 1.5
#
# Files:
#   /etc/nginx/sites-available/klawtax-api       → API reverse proxy
#   /etc/nginx/sites-available/klawtax-frontend  → Frontend static serving
#
# Enable:
#   sudo ln -s /etc/nginx/sites-available/klawtax-api      /etc/nginx/sites-enabled/
#   sudo ln -s /etc/nginx/sites-available/klawtax-frontend /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# After enabling, run Certbot to add SSL:
#   sudo certbot --nginx -d api.klawtax.online
#   sudo certbot --nginx -d klawtax.online -d www.klawtax.online
# ══════════════════════════════════════════════════════════════════════════════


# ── Global rate-limiting zone ─────────────────────────────────────────────────
# Place in /etc/nginx/nginx.conf http{} block (outside server blocks):
#
#   limit_req_zone $binary_remote_addr zone=klawtax_api:10m rate=30r/m;
#   limit_req_zone $binary_remote_addr zone=klawtax_auth:10m rate=10r/m;
#   limit_req_zone $binary_remote_addr zone=klawtax_webhook:10m rate=60r/m;
#
# These are reference comments only — add them to /etc/nginx/nginx.conf manually.


# ══════════════════════════════════════════════════════════════════════════════
# FILE 1: /etc/nginx/sites-available/klawtax-api
# ══════════════════════════════════════════════════════════════════════════════

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name api.klawtax.online;

    # ACME challenge (Let's Encrypt renewal)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # All other traffic → HTTPS
    location / {
        return 301 https://api.klawtax.online$request_uri;
    }
}

# HTTPS API server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.klawtax.online;

    # ── SSL (filled in by Certbot) ─────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/api.klawtax.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.klawtax.online/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ───────────────────────────────────────────────────
    # Note: Helmet in the Node.js app adds most headers.
    # Nginx adds HSTS and a few extras at the transport layer.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Robots-Tag "noindex, nofollow" always;  # API should not be indexed

    # ── Logging ────────────────────────────────────────────────────────────
    access_log /var/log/nginx/klawtax-api-access.log combined buffer=512k flush=1m;
    error_log  /var/log/nginx/klawtax-api-error.log warn;

    # ── Upload size limit ──────────────────────────────────────────────────
    # Must be ≥ the multer limit in the backend (20MB per file)
    client_max_body_size 25M;

    # ── Timeouts ───────────────────────────────────────────────────────────
    # Generous timeouts for document uploads and export generation
    proxy_read_timeout    120s;
    proxy_connect_timeout 10s;
    proxy_send_timeout    120s;

    # ── Proxy buffers ──────────────────────────────────────────────────────
    proxy_buffering    on;
    proxy_buffer_size  128k;
    proxy_buffers      4 256k;
    proxy_busy_buffers_size 256k;

    # ── Razorpay webhook — raw body required ──────────────────────────────
    # The webhook signature is computed over the raw request body.
    # Nginx must NOT buffer or modify the body for this endpoint.
    location /api/v1/webhooks/ {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # Disable buffering so raw body reaches Node.js intact
        proxy_request_buffering off;

        # Razorpay webhooks must always return 200 — generous timeout
        proxy_read_timeout 30s;
    }

    # ── File upload endpoints — disable buffering ─────────────────────────
    location ~ ^/api/v1/(projects|documents)/.*(upload|documents)$ {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # Large uploads need unbuffered pass-through
        proxy_request_buffering off;
        client_max_body_size    25M;
        proxy_read_timeout      180s;
    }

    # ── Auth endpoints — tighter rate limiting (via app-level) ────────────
    location /api/v1/auth/ {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # Rate limit at Nginx level as well (belt-and-suspenders)
        # Requires limit_req_zone in nginx.conf:
        # limit_req zone=klawtax_auth burst=5 nodelay;
    }

    # ── Health endpoints — no rate limiting ───────────────────────────────
    location /api/v1/health {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # Health checks from load balancers should not be cached
        add_header Cache-Control "no-store, no-cache" always;

        # No rate limiting on health checks
        access_log off;
    }

    # ── All other API routes ───────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # Keepalive for upstream efficiency
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }

    # ── Block direct access to non-API paths ──────────────────────────────
    location / {
        return 404 '{"error":"Not found","message":"This is the KlawTax API server. The frontend is at https://klawtax.online"}';
        add_header Content-Type application/json;
    }
}


# ══════════════════════════════════════════════════════════════════════════════
# FILE 2: /etc/nginx/sites-available/klawtax-frontend
# ══════════════════════════════════════════════════════════════════════════════

# HTTP → HTTPS redirect (www and non-www)
server {
    listen 80;
    listen [::]:80;
    server_name klawtax.online www.klawtax.online;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://klawtax.online$request_uri;
    }
}

# www → non-www redirect over HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.klawtax.online;

    ssl_certificate     /etc/letsencrypt/live/klawtax.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/klawtax.online/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://klawtax.online$request_uri;
}

# HTTPS Frontend server (canonical non-www)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name klawtax.online;

    ssl_certificate     /etc/letsencrypt/live/klawtax.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/klawtax.online/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Document root ──────────────────────────────────────────────────────
    root  /var/www/klawtax/frontend/dist;
    index index.html;

    # ── Security headers ───────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"   always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # ── Logging ────────────────────────────────────────────────────────────
    access_log /var/log/nginx/klawtax-frontend-access.log combined buffer=512k flush=1m;
    error_log  /var/log/nginx/klawtax-frontend-error.log warn;

    # ── Gzip compression ───────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # ── Static asset caching ───────────────────────────────────────────────
    # Hashed filenames (Vite default) — safe for immutable 1-year cache
    location ~* \.(js|css|woff2?|ttf|otf|eot)$ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Images
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp)$ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # HTML — no cache (always fresh for SPA shell)
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ── SPA fallback ───────────────────────────────────────────────────────
    # Next.js/Vite SPAs: all routes must return index.html
    location / {
        try_files $uri $uri/ /index.html;

        # index.html: no cache
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # ── Block dot files ────────────────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
